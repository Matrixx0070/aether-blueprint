id: lyrics_and_poems
description: |
  Detects song-lyric / poem / haiku-shaped output via consecutive short
  lines. Their brevity does not exempt them from copyright. v3 heuristic:
  twenty or more non-empty lines each ≤ 5 words. Raised from 8/8 to
  eliminate false-positives on technical audit bullet lists where lines
  like "Missing auth middleware" (3 words) appear in runs of 8+.
severity: critical
action: block
applies_when: not_creative_writing_context
detector:
  kind: builtin
  name: short_line_stanza
  config:
    min_consecutive_short_lines: 20
    max_words_per_line: 5
