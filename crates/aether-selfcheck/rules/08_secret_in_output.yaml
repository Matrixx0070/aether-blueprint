id: secret_in_output
description: |
  Credential-shaped strings in output. Covers AWS access keys, GitHub PATs
  (classic + server), Slack tokens (bot/app/user), OpenAI-style sk- tokens,
  Google API keys, and PEM private-key blocks. Block emission outright —
  any false positive is worth more than one false negative here.
severity: critical
action: block
applies_when: always
detector:
  kind: regex
  patterns:
    - '\bAKIA[0-9A-Z]{16}\b'
    - '\bASIA[0-9A-Z]{16}\b'
    - '\bghp_[A-Za-z0-9]{36}\b'
    - '\bghs_[A-Za-z0-9]{36}\b'
    - '\bgho_[A-Za-z0-9]{36}\b'
    - '\bxox[abpsr]-[A-Za-z0-9-]{10,}\b'
    - '\bsk-[A-Za-z0-9]{20,}\b'
    - '\bAIza[0-9A-Za-z_-]{35}\b'
    - '-----BEGIN (RSA |OPENSSH |EC |DSA )?PRIVATE KEY-----'
