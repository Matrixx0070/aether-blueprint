name: aether-coding-eval-v4
# Real coding-task benchmark. v2 doubles the suite from 5 → 10 tasks
# and adds Rust + JavaScript + SQL + multi-file + perf dimensions.
#
# Each task has:
#   - dir:            relative directory containing starting code + verify.sh
#   - prompt:         the exact prompt aether sees (single user message)
#   - timeout_secs:   kill the agent loop after N seconds
#
# Pass: verify.sh exits 0 against the post-aether working tree.
# verify.sh has no access to the prompt; it tests OBSERVABLE behavior
# of the produced code only.
tasks:
  # ─── v1 baseline (Python) ──────────────────────────────────────────
  - dir: tasks/01_bug_fix
    prompt: "There's a bug in count_words. Read the file, find it, fix it. Don't add unnecessary changes."
    timeout_secs: 180

  - dir: tasks/02_feature_add
    prompt: "Add a --reverse flag to the CLI in main.py that reverses the output string. Update tests."
    timeout_secs: 240

  - dir: tasks/03_write_test
    prompt: "Read math_helpers.py and write a complete pytest test file at test_math_helpers.py covering all functions. Run pytest to confirm it passes."
    timeout_secs: 240

  - dir: tasks/04_refactor
    prompt: "The function process_request in handler.py is too long. Extract pure helpers and shrink the main function. Behavior must not change. Run the existing tests to confirm."
    timeout_secs: 240

  - dir: tasks/05_doc_fix
    prompt: "The docstring in fetch_user is wrong — it claims behavior that the code does not implement. Fix the docstring to match what the code actually does. Don't change the code."
    timeout_secs: 120

  # ─── v2 expansion (Rust / JS / SQL / multi-file / perf) ────────────
  - dir: tasks/06_rust_bug
    prompt: "The binary_search function in src/lib.rs has off-by-one bugs that make the cargo tests fail. Read src/lib.rs, fix the bugs, run `cargo test` to confirm all tests pass. Don't change the tests."
    timeout_secs: 360

  - dir: tasks/07_js_xss
    prompt: "render.js builds an HTML string by interpolating user input directly into a template — that's an XSS hole. Fix renderComment so that <, >, &, \", and ' in user input are HTML-escaped before being inserted into the template. Don't change the function signature or break the happy path."
    timeout_secs: 240

  - dir: tasks/08_sql_injection
    prompt: "db.py concatenates the username into a SQL query — that's SQL injection. Rewrite find_user to use a parameterized query so the literal username string can never inject SQL, including names containing apostrophes. Keep the function signature unchanged."
    timeout_secs: 240

  - dir: tasks/09_multifile_refactor
    prompt: "order.py and invoice.py both define TAX_RATE = 0.08 and have an identical subtotal+tax calculation. Extract the duplicated logic AND the TAX_RATE constant into a new shared module that both files import. Tests must still pass after the change."
    timeout_secs: 300

  - dir: tasks/10_perf_opt
    prompt: "dedup in dedup.py is O(n²) — it scans the output list for each input element. Rewrite it as O(n) average using a set for membership lookup while still preserving the first-seen order of elements. Don't change the function signature."
    timeout_secs: 180

  # ─── v3 expansion (Go / TS / Bash / Dockerfile / Java) ─────────────
  - dir: tasks/11_go_nil_deref
    prompt: "user.go has nil-pointer dereferences in SummaryLine and CountEmailDomains — they panic when User.Email or User.Profile is nil. Run `go test ./...` to see the panics, then fix the code so all tests pass without changing the test file."
    timeout_secs: 240

  - dir: tasks/12_ts_type_bug
    prompt: "parser.ts uses `as Config` to silence the type system about a function that returns an object with possibly-undefined fields. Make the return type honest — either change Config to allow optional fields with proper Partial<>, return Config | null, or throw on missing input. Don't keep the `as Config` cast. Run `tsc` to confirm clean."
    timeout_secs: 240

  - dir: tasks/13_bash_quoting
    prompt: "backup.sh has unquoted variable expansions ($SRC and $DEST) so paths with spaces break. Fix the quoting so directories containing spaces are handled correctly. Also fix the missing-arg check that has the same bug. Run shellcheck to verify (if available)."
    timeout_secs: 180

  - dir: tasks/14_dockerfile_security
    prompt: "Harden the Dockerfile: pin the Python base image to a specific tag (not :latest), add a non-root USER, switch ADD to COPY for local files, add --no-install-recommends to apt-get install, and add a HEALTHCHECK directive."
    timeout_secs: 240

  - dir: tasks/15_java_npe
    prompt: "Inventory.java throws NullPointerException whenever a SKU is queried or restocked for the first time. Fix restock, available, and canFulfill so that querying a missing SKU returns 0 and restocking a new SKU starts at the given quantity. Don't change InventoryTest.java; just make the existing tests pass."
    timeout_secs: 240

  # ─── v4: design-decision tasks (ambiguous prompts) ─────────────────
  # Each task has multiple valid implementations; the agent must commit
  # to a choice AND document the assumption (since the eval is
  # automated and "asking for clarification" = no edits = fail). This
  # tests whether the agent will surface design decisions in the code.
  - dir: tasks/16_ambiguous_rounding
    prompt: "round_to in rounding.py is unimplemented. Implement it. The choice of half-rounding strategy (banker's, half-up, etc.) is yours — pick one, implement it, and document your choice in the docstring."
    timeout_secs: 180

  - dir: tasks/17_sort_choice
    prompt: "sort_records in sorter.py is unimplemented. Implement it. Choose your sort key (name or score), direction, and stability; document what you chose so callers know the contract."
    timeout_secs: 180

  - dir: tasks/18_cache_strategy
    prompt: "get_value in slow.py calls a 50ms-per-call lookup with no caching. Add caching so 100 calls with the same key complete in under 500ms total. Pick a caching strategy (LRU, FIFO, TTL, unbounded memo, etc.) and document your choice in the docstring."
    timeout_secs: 180
