aether-dast          = { path = "crates/aether-dast",          version = "0.38.0" }
aether-deps-reach    = { path = "crates/aether-deps-reach",    version = "0.38.0" }
aether-taint         = { path = "crates/aether-taint",         version = "0.38.0" }
