[workspace]
resolver = "2"
members = ["crates/*"]

[workspace.package]
version = "0.38.0"
edition = "2021"
license = "Apache-2.0"
description = "AetherCode — a 10x Claude Code clone (workspace)"

[workspace.dependencies]
# General
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
serde_json = "1"
anyhow = "1"
thiserror = "2"
once_cell = "1.19"
regex = "1.10"
async-trait = "0.1"

# Runtime
tokio = { version = "1", features = ["rt-multi-thread", "macros", "fs", "io-util", "process", "time", "sync", "signal"] }

# HTTP
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json", "charset", "stream"] }
futures-util = { version = "0.3", default-features = false, features = ["std"] }
base64 = "0.22"
jsonwebtoken = "9"
bytes = "1"
hex = "0.4"
sha2 = "0.10"
hmac = "0.12"
ed25519-dalek = { version = "2", features = ["rand_core", "pkcs8", "pem"] }
# EE6: pure-Rust Ed448 + Curve448 (RustCrypto). `signing` pulls in the
# ed448 EdDSA scheme + Verifier trait. NB: Ed448 is far less battle-
# tested than Ed25519 (audit gap per Plan EE risk register §EE6);
# trust assumption documented at the verify call-site.
ed448-goldilocks = { version = "0.14.0-pre.15", features = ["signing", "getrandom"] }
rand_core = { version = "0.6", features = ["getrandom"] }
rusqlite = { version = "0.32", features = ["bundled"] }
notify = { version = "6", default-features = false, features = ["macos_kqueue"] }
tokio-stream = "0.1"
redis = { version = "0.27", default-features = false, features = ["tokio-comp"] }
flate2 = { version = "1", default-features = false, features = ["rust_backend"] }
quick-xml = { version = "0.36", default-features = false }
rsa = { version = "0.9", default-features = false, features = ["sha2", "pem"] }
x509-parser = { version = "0.16", default-features = false }
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
glob = "0.3"
syn = { version = "2", features = ["full", "visit", "extra-traits"] }
toml = "0.8"
ureq = { version = "2.9", features = ["json"] }

# CLI
clap = { version = "4", features = ["derive", "env"] }

# Internal — workspace-relative path deps. Versioned so each crate can be
# published independently later without changing call sites.
aether-hook      = { path = "crates/aether-hook",      version = "0.38.0" }
aether-selfcheck = { path = "crates/aether-selfcheck", version = "0.38.0" }
aether-overlay   = { path = "crates/aether-overlay",   version = "0.38.0" }
aether-llm       = { path = "crates/aether-llm",       version = "0.38.0" }
aether-tools     = { path = "crates/aether-tools",     version = "0.38.0" }
aether-mcp       = { path = "crates/aether-mcp",       version = "0.38.0" }
aether-perm      = { path = "crates/aether-perm",      version = "0.38.0" }
aether-mem       = { path = "crates/aether-mem",       version = "0.38.0" }
aether-skill     = { path = "crates/aether-skill",     version = "0.38.0" }
aether-store     = { path = "crates/aether-store",     version = "0.38.0" }
aether-render    = { path = "crates/aether-render",    version = "0.38.0" }
aether-core      = { path = "crates/aether-core",      version = "0.38.0" }
aether-sec       = { path = "crates/aether-sec",       version = "0.38.0" }
aether-plugin    = { path = "crates/aether-plugin",    version = "0.38.0" }
aether-plugin-wasm = { path = "crates/aether-plugin-wasm", version = "0.38.0" }
aether-flow        = { path = "crates/aether-flow",        version = "0.38.0" }
aether-symexec     = { path = "crates/aether-symexec",     version = "0.38.0" }
aether-difffuzz    = { path = "crates/aether-difffuzz",    version = "0.38.0" }
aether-muttest     = { path = "crates/aether-muttest",     version = "0.38.0" }
aether-abi         = { path = "crates/aether-abi",         version = "0.38.0" }
aether-concolic    = { path = "crates/aether-concolic",    version = "0.38.0" }
aether-invariant   = { path = "crates/aether-invariant",   version = "0.38.0" }
aether-shuttle     = { path = "crates/aether-shuttle",     version = "0.38.0" }
aether-lockgraph   = { path = "crates/aether-lockgraph",   version = "0.38.0" }
aether-threat-intel  = { path = "crates/aether-threat-intel",  version = "0.38.0" }
aether-hwsec         = { path = "crates/aether-hwsec",         version = "0.38.0" }
aether-crypto-audit  = { path = "crates/aether-crypto-audit",  version = "0.38.0" }
aether-supply-chain  = { path = "crates/aether-supply-chain",  version = "0.38.0" }
aether-malware       = { path = "crates/aether-malware",       version = "0.38.0" }
aether-container     = { path = "crates/aether-container",     version = "0.38.0" }
aether-reveng        = { path = "crates/aether-reveng",        version = "0.38.0" }
